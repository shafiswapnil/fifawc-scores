name: FIFAWCSCORES
options:
  bundleIdPrefix: com.fifawcscores
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEAD_CODE_STRIPPING: YES

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  FIFAWCSCORES:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/README.md"
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fifawcscores.app
        PRODUCT_NAME: FIFAWC Scores
        PRODUCT_MODULE_NAME: FIFAWCSCORES
        INFOPLIST_FILE: Sources/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"

  FIFAWCScoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/FIFAWCScoreTests
    dependencies:
      - target: FIFAWCSCORES
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fifawcscores.tests
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FIFAWC Scores.app/Contents/MacOS/FIFAWC Scores"

schemes:
  FIFAWCSCORES:
    build:
      targets:
        FIFAWCSCORES: all
    test:
      targets:
        - FIFAWCScoreTests
      gatherCoverageData: true

  FIFAWCScoreTests:
    build:
      targets:
        FIFAWCScoreTests: all
    test:
      targets:
        - FIFAWCScoreTests
      gatherCoverageData: true
